version: "2.0"

services:
  metal-blockchain:
    image: ubuntu:22.04
    command: ["/bin/bash", "-c", "echo 'Installing MetalGo on Ubuntu...' && apt-get update -o Acquire::http::Pipeline-Depth=0 && apt-get install -y --no-install-recommends wget curl jq ca-certificates openssl && echo 'Downloading MetalGo...' && wget --no-check-certificate -O metalgo.tar.gz https://github.com/MetalBlockchain/metalgo/releases/download/v1.12.0-hotfix/metalgo-linux-amd64-v1.12.0-hotfix.tar.gz && echo 'Extracting MetalGo...' && tar -xzf metalgo.tar.gz && mv metalgo-v1.12.0-hotfix/metalgo /usr/local/bin/ && chmod +x /usr/local/bin/metalgo && rm -rf metalgo-v1.12.0-hotfix metalgo.tar.gz && echo 'Creating data directory...' && mkdir -p /root/.metalgo && echo 'Getting public IP...' && PUBLIC_IP=$(curl -s ifconfig.me) && echo 'Starting MetalGo node with IP:' $PUBLIC_IP && /usr/local/bin/metalgo --network-id=381931 --public-ip=$PUBLIC_IP --http-host=0.0.0.0 --http-port=9650 --bootstrap-ips=18.191.131.99:9651,54.187.216.72:9651,52.15.76.75:9651 --bootstrap-ids=NodeID-7Xhw2mDxuDS44j42TCB6U5579esbSt3Lg,NodeID-MFrZFVCXPv5iCn6M9K6xdux44YNB3v3H8,NodeID-NFBbbJ4qdtNaUXx4RUU6Dju6cr4V7cg1 --log-level=info & METAL_PID=$! && echo 'Waiting for MetalGo to fully initialize...' && sleep 30 && echo 'Checking if staking keys exist...' && while [ ! -f /root/.metalgo/staking/staker.key ]; do echo 'Waiting for staking keys...' && sleep 5; done && echo 'Staking keys found! Waiting for API to be ready...' && sleep 15 && echo '=== METAL VALIDATOR SETUP DATA ===' && echo 'Copy the following data to your Metal dashboard:' && echo '' && echo 'Node ID' && NODE_ID=$(curl -s http://localhost:9650/ext/info | jq -r '.nodeID' 2>/dev/null || echo 'NodeID-not-found') && echo 'NodeID-'$NODE_ID && echo '' && echo 'Proof of Possession' && echo 'The public key portion of the proof of possession:' && echo '' && echo 'Public Key' && openssl x509 -in /root/.metalgo/staking/staker.crt -pubkey -noout && echo '' && echo 'The signature portion of the proof of possession:' && echo '' && echo 'Signature' && openssl x509 -in /root/.metalgo/staking/staker.crt -text -noout | grep -A 1 'Signature Algorithm' | tail -1 | sed 's/.*Signature Value://' | tr -d ' ' && echo '' && echo '=== DEPLOYMENT COMPLETE ===' && echo 'Your Metal node is running and ready for validator setup!' && wait $METAL_PID"]
    env:
      - METAL_NETWORK_ID=381931
      - METAL_PUBLIC_IP=AKASH_CLUSTER_PUBLIC_HOSTNAME
      - METAL_HTTP_HOST=0.0.0.0
      - METAL_HTTP_PORT=9650
      - METAL_P2P_PORT=9651
      - METAL_STAKING_ENABLED=true
      - METAL_BOOTSTRAP_IPS=18.191.131.99:9651,54.187.216.72:9651,52.15.76.75:9651
      - METAL_BOOTSTRAP_IDS=NodeID-7Xhw2mDxuDS44j42TCB6U5579esbSt3Lg,NodeID-MFrZFVCXPv5iCn6M9K6xdux44YNB3v3H8,NodeID-NFBbbJ4qdtNaUXx4RUU6Dju6cr4V7cg1
    expose:
      - port: 9650
        as: 9650
        to:
          - global: true
        proto: tcp
      - port: 9651  
        as: 9651
        to:
          - global: true
        proto: tcp


profiles:
  compute:
    metal-blockchain:
      resources:
        cpu:
          units: 2.0
        memory:
          size: 4Gi
        storage:
          - size: 120Gi


  placement:
    any-provider:
      attributes: {}
      pricing:
        metal-blockchain:
          denom: uakt
          amount: 2000

deployment:
  metal-blockchain:
    any-provider:
      profile: metal-blockchain
      count: 1