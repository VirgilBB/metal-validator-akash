version: "2.0"

services:
  metal-blockchain:
    image: ubuntu:22.04
    command: ["/bin/bash", "-c", "echo 'Setting file descriptor limits...' && ulimit -n 65536 && echo 'Installing MetalGo on Ubuntu...' && apt-get update -o Acquire::http::Pipeline-Depth=0 && apt-get install -y --no-install-recommends wget curl jq ca-certificates openssl && echo 'Downloading MetalGo...' && wget --no-check-certificate -O metalgo.tar.gz https://github.com/MetalBlockchain/metalgo/releases/download/v1.12.0-hotfix/metalgo-linux-amd64-v1.12.0-hotfix.tar.gz && echo 'Extracting MetalGo...' && tar -xzf metalgo.tar.gz && mv metalgo-v1.12.0-hotfix/metalgo /usr/local/bin/ && chmod +x /usr/local/bin/metalgo && rm -rf metalgo-v1.12.0-hotfix metalgo.tar.gz && echo 'Creating data directory...' && mkdir -p /root/.metalgo && echo 'Getting public IP...' && PUBLIC_IP=$(curl -s ifconfig.me) && echo 'Starting MetalGo node with IP:' $PUBLIC_IP && /usr/local/bin/metalgo --network-id=381931 --public-ip=$PUBLIC_IP --http-host=0.0.0.0 --http-port=9650 --log-level=info & METAL_PID=$! && echo 'Waiting for MetalGo to fully initialize...' && sleep 30 && echo 'Checking if staking keys exist...' && while [ ! -f /root/.metalgo/staking/staker.key ]; do echo 'Waiting for staking keys...' && sleep 5; done && echo 'Staking keys found! Waiting for API to be ready...' && sleep 15 && echo '=== METAL VALIDATOR SETUP DATA ===' && echo 'Copy the following data to your Metal dashboard:' && echo '' && echo '1. NODE ID:' && NODE_ID=$(curl -s http://localhost:9650/ext/info | jq -r '.nodeID' 2>/dev/null || echo 'NodeID-not-found') && echo 'NodeID-'$NODE_ID && echo '' && echo '2. PRIVATE KEY (for staking):' && cat /root/.metalgo/staking/staker.key && echo '' && echo '3. CERTIFICATE (for staking):' && cat /root/.metalgo/staking/staker.crt && echo '' && echo '4. PUBLIC KEY (extracted from certificate):' && openssl x509 -in /root/.metalgo/staking/staker.crt -pubkey -noout && echo '' && echo '5. CERTIFICATE SIGNATURE (for proof of possession):' && openssl x509 -in /root/.metalgo/staking/staker.crt -text -noout | grep -A 1 'Signature Algorithm' && echo '' && echo '=== DEPLOYMENT COMPLETE ===' && echo 'Your Metal node is running and ready for validator setup!' && wait $METAL_PID"]
    env:
      - METAL_NETWORK_ID=381931
      - METAL_PUBLIC_IP=AKASH_CLUSTER_PUBLIC_HOSTNAME
      - METAL_HTTP_HOST=0.0.0.0
      - METAL_HTTP_PORT=9650
      - METAL_P2P_PORT=9651
      - METAL_STAKING_ENABLED=true
      - METAL_BOOTSTRAP_IPS=${METAL_BOOTSTRAP_IPS:-}
      - METAL_BOOTSTRAP_IDS=${METAL_BOOTSTRAP_IDS:-}
    expose:
      - port: 9650
        as: 9650
        to:
          - global: true
        proto: tcp
      - port: 9651  
        as: 9651
        to:
          - global: true
        proto: tcp

  nginx-proxy:
    image: nginx:alpine
    command: ["/bin/sh", "-c", "echo 'Setting file descriptor limits for nginx...' && ulimit -n 65536 && echo 'Waiting for MetalGo to start...' && sleep 60 && echo 'Configuring nginx...' && echo 'worker_processes 1;' > /etc/nginx/nginx.conf && echo 'events { worker_connections 1024; }' >> /etc/nginx/nginx.conf && echo 'http {' >> /etc/nginx/nginx.conf && echo '    upstream metal_rpc { server metal-blockchain:9650; }' >> /etc/nginx/nginx.conf && echo '    server {' >> /etc/nginx/nginx.conf && echo '        listen 80;' >> /etc/nginx/nginx.conf && echo '        location / { proxy_pass http://metal_rpc; }' >> /etc/nginx/nginx.conf && echo '        location /ext/info { proxy_pass http://metal_rpc/ext/info; }' >> /etc/nginx/nginx.conf && echo '    }' >> /etc/nginx/nginx.conf && echo '    server {' >> /etc/nginx/nginx.conf && echo '        listen 9650;' >> /etc/nginx/nginx.conf && echo '        location / { proxy_pass http://metal_rpc; }' >> /etc/nginx/nginx.conf && echo '    }' >> /etc/nginx/nginx.conf && echo '}' >> /etc/nginx/nginx.conf && echo 'Starting nginx with increased file limits...' && nginx -g 'daemon off;'"]
    env:
      - METAL_NODE_HOST=metal-blockchain
      - METAL_RPC_PORT=9650
      - METAL_P2P_PORT=9651
    expose:
      - port: 80
        as: 80
        to:
          - global: true
        proto: tcp
      - port: 443
        as: 443
        to:
          - global: true
        proto: tcp
      - port: 9650
        as: 9650
        to:
          - global: true
        proto: tcp
      - port: 9651
        as: 9651
        to:
          - global: true
        proto: tcp
    depends_on:
      - metal-blockchain

profiles:
  compute:
    metal-blockchain:
      resources:
        cpu:
          units: 2.0
        memory:
          size: 4Gi
        storage:
          - size: 120Gi

    nginx-proxy:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 1Gi
        storage:
          - size: 3Gi

  placement:
    metal-providers:
      attributes:
        host: akash
        tier: community
      pricing:
        metal-blockchain:
          denom: uakt
          amount: 2000
        nginx-proxy:
          denom: uakt
          amount: 500

deployment:
  metal-blockchain:
    metal-providers:
      profile: metal-blockchain
      count: 1
  nginx-proxy:
    metal-providers:
      profile: nginx-proxy
      count: 1